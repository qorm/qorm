# gateway.conf — the protected virtual server. Copy per site; set server_name,
# TLS certs, and the upstream. The WAF runs on every request via access_by_lua.

server {
    listen      80;
    # listen      443 ssl http2;
    server_name qorm.com www.qorm.com;

    # ssl_certificate     /etc/ssl/certs/site.crt;
    # ssl_certificate_key /etc/ssl/private/site.key;
    # ssl_protocols       TLSv1.2 TLSv1.3;

    # L0: native throttles (burst absorbs legitimate spikes; nodelay = no queue)
    limit_req  zone=perip burst=60 nodelay;
    limit_conn connperip 100;
    limit_req_status  429;
    limit_conn_status 429;

    # L1: the Lua WAF. access = the gate; log = release the concurrency slot.
    access_by_lua_block { require("waf").access() }
    log_by_lua_block    { require("waf").finish() }

    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
    }

    # WAF metrics — lock this down to your admin network.
    location = /waf-status {
        allow 127.0.0.1;
        allow ::1;
        deny  all;
        content_by_lua_block { require("waf").status() }
    }

    # A friendly, cache-busting 429/403 body could be added via error_page here.
}

