# nginx.conf — OpenResty WAF gateway. A general-purpose reverse proxy that
# fronts any backend with a Lua WAF (rate-limit / anti-CC, DDoS mitigation,
# IP+geo filtering, bot/UA + request constraints, and SQLi/XSS/traversal/RCE
# signatures). Run: openresty -p /path/to/deploy/waf -c nginx.conf
#
# Layers of defence:
#   L0  nginx timeouts + limit_req/limit_conn zones (cheap, kernel-adjacent)
#   L1  Lua WAF in access_by_lua (ban store, signatures, per-IP accounting)

worker_processes  auto;
worker_rlimit_nofile 65535;
error_log  logs/error.log notice;
pid        logs/nginx.pid;

events {
    worker_connections 16384;
    multi_accept on;
}

http {
    # ---- Lua runtime ----------------------------------------------------------
    lua_package_path "$prefix/lua/?.lua;;";
    lua_code_cache on;

    # WAF shared state (survives across all workers)
    lua_shared_dict waf_bans     10m;   # ip -> ban-until timestamp
    lua_shared_dict waf_strikes  10m;   # ip -> repeat-offense count (escalation)
    lua_shared_dict waf_counters 64m;   # rate + volumetric-flood counters
    lua_shared_dict waf_conn     16m;   # per-ip in-flight concurrency
    lua_shared_dict waf_metrics  10m;   # block metrics for /waf-status

    init_worker_by_lua_block {
        -- warm the modules so the first request isn't slow
        require "config"; require "waf"
    }

    # ---- L0: native anti-DDoS / anti-slow-loris -------------------------------
    limit_req_zone  $binary_remote_addr zone=perip:32m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=connperip:16m;

    client_body_timeout     10s;
    client_header_timeout   10s;
    send_timeout            10s;
    keepalive_timeout       30s;
    reset_timedout_connection on;
    client_max_body_size    8m;
    client_body_buffer_size 256k;       # bodies up to this stay in memory (WAF-scannable)

    server_tokens off;

    log_format waf '$remote_addr - [$time_local] "$request" $status '
                   '$body_bytes_sent "$http_referer" "$http_user_agent" '
                   'rt=$request_time uct=$upstream_connect_time';
    access_log logs/access.log waf buffer=32k flush=2s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # ---- upstream(s) to protect — point at your real backend ------------------
    upstream backend {
        server 127.0.0.1:8080 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    include conf.d/*.conf;
}
