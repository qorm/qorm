name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  binaries:
    name: cross-compile + release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git describe` stamps the version
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Sanity (vet + test)
        run: go vet ./... && go test ./...
      - name: Cross-compile every platform
        run: QORM_VERSION="${GITHUB_REF_NAME}" ./scripts/build-all.sh dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
