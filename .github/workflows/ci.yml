name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (pure Go)
        run: go build ./...
      - name: Build (WASM client)
        run: GOOS=js GOARCH=wasm go build -o /dev/null ./cmd/qorm-wasm
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  desktop:
    name: build (native desktop, cgo)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build (-tags desktop)
        run: go build -tags desktop -o /dev/null ./cmd/qorm

  binaries:
    name: cross-compile (downloadable artifacts)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # so build-all.sh can `git describe` the version
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Cross-compile every platform
        run: ./scripts/build-all.sh dist
      - uses: actions/upload-artifact@v4
        with:
          name: qorm-binaries
          path: dist/*
          retention-days: 30
